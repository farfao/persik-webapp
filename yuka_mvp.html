<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Yuka MVP - Сканирование ингредиентов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 0;
            background: white;
            min-height: 100vh;
            position: relative;
        }
        .header {
            text-align: center;
            padding: 15px 0;
            background: rgba(255,255,255,0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #f0f0f0;
        }
        .header h1 {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 5px;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
        }
        #video, #canvas, #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #video {
            object-fit: cover;
        }
        #canvas {
            display: none;
        }
        #overlay {
            pointer-events: none;
            z-index: 10;
        }
        .controls {
            padding: 15px;
            background: rgba(255,255,255,0.95);
            position: sticky;
            bottom: 0;
        }
        .btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px 0;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger {
            background: #f56565;
        }
        .btn-danger:hover {
            background: #e53e3e;
        }
        .btn-success {
            background: #48bb78;
        }
        .btn-success:hover {
            background: #38a169;
        }
        .ingredients-panel {
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            background: #f7fafc;
        }
        .ingredient-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 10px;
            margin: 2px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }
        .status {
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        .status.scanning {
            background: #bee3f8;
            color: #2c5282;
        }
        .status.found {
            background: #c6f6d5;
            color: #22543d;
        }
        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: #edf2f7;
            border-bottom: 1px solid #e2e8f0;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        .word-highlight {
            position: absolute;
            border: 2px solid #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Yuka MVP</h1>
            <div class="status" id="status">📷 Включите камеру для сканирования</div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="wordCount">0</div>
                <div class="stat-label">Найдено слов</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="ingredientCount">0</div>
                <div class="stat-label">Ингредиентов</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="scanCount">0</div>
                <div class="stat-label">Сканирований</div>
            </div>
        </div>

        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div id="overlay"></div>
        </div>

        <div class="ingredients-panel" id="ingredientsPanel" style="display: none;">
            <h3>🧪 Найденные ингредиенты:</h3>
            <div id="ingredientsList"></div>
        </div>

        <div class="controls">
            <button id="startCamera" class="btn">📷 Включить камеру</button>
            <button id="startScan" class="btn btn-success" style="display: none;">🔍 Начать сканирование</button>
            <button id="stopScan" class="btn btn-danger" style="display: none;">⏹️ Остановить</button>
            <button id="sendData" class="btn" style="display: none;">📤 Отправить в бота</button>
            <button id="reset" class="btn" style="display: none;">🔄 Новое сканирование</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#667eea');

        // Переменные
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let overlay = document.getElementById('overlay');
        let ctx = canvas.getContext('2d');
        let octx = overlay.getContext('2d');
        let stream = null;
        let isScanning = false;
        let scanInterval = null;
        let scanCount = 0;

        // Хранилище найденных слов
        let detectedWords = new Map();
        let ingredients = new Set();

        // Элементы управления
        let startCameraBtn = document.getElementById('startCamera');
        let startScanBtn = document.getElementById('startScan');
        let stopScanBtn = document.getElementById('stopScan');
        let sendDataBtn = document.getElementById('sendData');
        let resetBtn = document.getElementById('reset');
        let statusDiv = document.getElementById('status');
        let ingredientsPanel = document.getElementById('ingredientsPanel');
        let ingredientsList = document.getElementById('ingredientsList');

        // Статистика
        let wordCountEl = document.getElementById('wordCount');
        let ingredientCountEl = document.getElementById('ingredientCount');
        let scanCountEl = document.getElementById('scanCount');

        // Обработчики событий
        startCameraBtn.addEventListener('click', startCamera);
        startScanBtn.addEventListener('click', startScanning);
        stopScanBtn.addEventListener('click', stopScanning);
        sendDataBtn.addEventListener('click', sendData);
        resetBtn.addEventListener('click', resetScanner);

        async function startCamera() {
            try {
                updateStatus('📷 Включение камеры...', 'scanning');
                
                // Проверяем поддержку
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('Камера не поддерживается');
                }
                
                // Запрашиваем права на камеру
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                if (!stream) {
                    throw new Error('Не удалось получить доступ к камере');
                }
                
                video.srcObject = stream;
                
                // Ждем загрузки видео
                video.onloadedmetadata = () => {
                    video.play();
                    startCameraBtn.style.display = 'none';
                    startScanBtn.style.display = 'block';
                    updateStatus('📸 Камера включена. Нажмите "Начать сканирование"', 'found');
                };
                
            } catch (error) {
                console.error('Ошибка камеры:', error);
                
                if (error.name === 'NotAllowedError') {
                    updateStatus('❌ Доступ к камере запрещен. Разрешите в настройках браузера', 'error');
                } else if (error.name === 'NotFoundError') {
                    updateStatus('❌ Камера не найдена', 'error');
                } else if (error.name === 'NotSupportedError') {
                    updateStatus('❌ Камера не поддерживается', 'error');
                } else {
                    updateStatus('❌ Ошибка камеры: ' + error.message, 'error');
                }
                
                // Показываем альтернативу
                showFileInput();
            }
        }

        function showFileInput() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            
                            startCameraBtn.style.display = 'none';
                            startScanBtn.style.display = 'block';
                            
                            updateStatus('📷 Фото загружено. Нажмите "Начать сканирование"', 'found');
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function startScanning() {
            if (isScanning) return;
            
            isScanning = true;
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'block';
            ingredientsPanel.style.display = 'block';
            
            updateStatus('🔍 Сканирование...', 'scanning');
            
            // Начинаем сканирование каждые 1000мс
            scanInterval = setInterval(scanFrame, 1000);
        }

        function stopScanning() {
            if (!isScanning) return;
            
            isScanning = false;
            clearInterval(scanInterval);
            
            stopScanBtn.style.display = 'none';
            sendDataBtn.style.display = 'block';
            resetBtn.style.display = 'block';
            
            updateStatus(`✅ Сканирование завершено! Найдено ${ingredients.size} ингредиентов`, 'found');
        }

        async function scanFrame() {
            if (!isScanning) return;
            
            try {
                // Захватываем кадр
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                scanCount++;
                updateStats();
                
                // OCR распознавание
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                
                const result = await Tesseract.recognize(imageData, 'eng+rus', {
                    logger: (m) => {
                        if (m.status === 'recognizing text') {
                            const progress = Math.round(m.progress * 100);
                            if (progress % 25 === 0) {
                                console.log(`OCR прогресс: ${progress}%`);
                            }
                        }
                    }
                });
                
                // Обрабатываем распознанные слова
                handleWords(result.data.words);
                
            } catch (error) {
                console.error('Ошибка сканирования:', error);
            }
        }

        function handleWords(words) {
            words.forEach(word => {
                const normalizedText = normalizeText(word.text);
                
                // Проверяем является ли слово ингредиентом
                if (isIngredient(normalizedText)) {
                    // Добавляем в Map если еще нет
                    if (!detectedWords.has(normalizedText)) {
                        detectedWords.set(normalizedText, {
                            text: normalizedText,
                            x: word.bbox.x0,
                            y: word.bbox.y0,
                            w: word.bbox.x1 - word.bbox.x0,
                            h: word.bbox.y1 - word.bbox.y0,
                            confidence: word.confidence,
                            firstSeen: Date.now()
                        });
                        
                        ingredients.add(normalizedText);
                        updateIngredientsList();
                        updateStats();
                    } else {
                        // Обновляем время последнего обнаружения
                        const existing = detectedWords.get(normalizedText);
                        if (existing) {
                            existing.lastSeen = Date.now();
                        }
                    }
                }
            });
            
            // Отрисовка overlay
            drawOverlay();
        }

        function normalizeText(text) {
            return text
                .toUpperCase()
                .replace(/[^A-ZА-ЯЁ0-9-]/g, '')
                .trim();
        }

        function isIngredient(word) {
            if (word.length < 3) return false;
            if (word.length > 30) return false;
            
            // Исключаем цифры и короткие слова
            if (/^\d+$/.test(word)) return false;
            
            // Базовые фильтры
            const excludeWords = ['THE', 'AND', 'FOR', 'WITH', 'INGREDIENTS', 'AQUA', 'WATER'];
            if (excludeWords.includes(word)) return false;
            
            // Химические паттерны
            const chemicalPatterns = [
                /^[A-Z]+[0-9]*$/,  // ACID, VITAMIN C, etc
                /^[A-Z]+-+[A-Z0-9]+$/, // COENZYME Q10
                /^[A-Z]+.*OL$/, // ALCOHOL, PHENOL
                /^[A-Z]+.*IC$/, // ACID, BASIC
                /^[A-Z]+.*YL$/, // METHYL, ETHYL
                /^[A-Z]+.*OXIDE$/, // ZINC OXIDE
                /^[A-Z]+.*LATE$/, // SILICONE
            ];
            
            return chemicalPatterns.some(pattern => pattern.test(word));
        }

        function drawOverlay() {
            octx.clearRect(0, 0, overlay.width, overlay.height);
            
            detectedWords.forEach((word, text) => {
                const age = Date.now() - word.firstSeen;
                const opacity = Math.max(0.3, 1 - age / 10000); // Исчезает за 10 секунд
                
                octx.strokeStyle = `rgba(255, 107, 107, ${opacity})`;
                octx.lineWidth = 2;
                octx.strokeRect(word.x, word.y, word.w, word.h);
                
                octx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                octx.fillRect(word.x, word.y - 20, text.length * 8 + 4, 20);
                
                octx.fillStyle = `rgba(255, 107, 107, ${opacity})`;
                octx.font = 'bold 12px Arial';
                octx.fillText(text, word.x + 2, word.y - 5);
            });
        }

        function updateIngredientsList() {
            ingredientsList.innerHTML = '';
            
            Array.from(ingredients).sort().forEach(ingredient => {
                const tag = document.createElement('span');
                tag.className = 'ingredient-tag';
                tag.textContent = ingredient;
                ingredientsList.appendChild(tag);
            });
        }

        function updateStats() {
            wordCountEl.textContent = detectedWords.size;
            ingredientCountEl.textContent = ingredients.size;
            scanCountEl.textContent = scanCount;
        }

        function sendData() {
            if (ingredients.size === 0) {
                updateStatus('❌ Нет ингредиентов для отправки', 'error');
                return;
            }
            
            try {
                const data = {
                    action: 'scan_ingredients',
                    ingredients: Array.from(ingredients).join(', '),
                    scan_count: scanCount,
                    words_found: detectedWords.size,
                    timestamp: new Date().toISOString()
                };
                
                console.log('📤 Отправка данных:', data);
                
                tg.sendData(JSON.stringify(data));
                
                updateStatus('📤 Данные отправлены в бота!', 'found');
                
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка отправки:', error);
                updateStatus('❌ Ошибка отправки данных', 'error');
            }
        }

        function resetScanner() {
            // Сброс всех состояний
            detectedWords.clear();
            ingredients.clear();
            scanCount = 0;
            isScanning = false;
            
            if (scanInterval) {
                clearInterval(scanInterval);
            }
            
            // Очистка интерфейса
            octx.clearRect(0, 0, overlay.width, overlay.height);
            ingredientsList.innerHTML = '';
            ingredientsPanel.style.display = 'none';
            
            // Обновление кнопок
            startScanBtn.style.display = 'block';
            stopScanBtn.style.display = 'none';
            sendDataBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            
            updateStats();
            updateStatus('📸 Готов к новому сканированию', 'found');
        }

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            console.log('Status:', message);
        }

        // Инициализация
        updateStatus('📷 Нажмите "Включить камеру" для начала', 'found');
        
        // Проверка поддержки камеры
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            updateStatus('❌ Камера не поддерживается', 'error');
            showFileInput();
        }
    </script>
</body>
</html>
