<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Yuka MVP - Сканирование ингредиентов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 0;
            background: white;
            min-height: 100vh;
            position: relative;
        }
        .header {
            text-align: center;
            padding: 15px 0;
            background: rgba(255,255,255,0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #f0f0f0;
        }
        .header h1 {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 5px;
        }
        .camera-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
        }
        #video, #canvas, #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #video {
            object-fit: cover;
        }
        #canvas {
            display: none;
        }
        #overlay {
            pointer-events: none;
            z-index: 10;
        }
        .controls {
            padding: 15px;
            background: rgba(255,255,255,0.95);
            position: sticky;
            bottom: 0;
        }
        .btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px 0;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger {
            background: #f56565;
        }
        .btn-danger:hover {
            background: #e53e3e;
        }
        .btn-success {
            background: #48bb78;
        }
        .btn-success:hover {
            background: #38a169;
        }
        .ingredients-panel {
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            background: #f7fafc;
        }
        .ingredient-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 10px;
            margin: 2px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }
        .status {
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        .status.scanning {
            background: #bee3f8;
            color: #2c5282;
        }
        .status.found {
            background: #c6f6d5;
            color: #22543d;
        }
        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: #edf2f7;
            border-bottom: 1px solid #e2e8f0;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        .word-highlight {
            position: absolute;
            border: 2px solid #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 3px;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Yuka MVP</h1>
            <div class="status" id="status">📷 Включите камеру для сканирования</div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="wordCount">0</div>
                <div class="stat-label">Найдено слов</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="ingredientCount">0</div>
                <div class="stat-label">Ингредиентов</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="scanCount">0</div>
                <div class="stat-label">Сканирований</div>
            </div>
        </div>

        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <canvas id="overlay"></canvas>
        </div>

        <div class="ingredients-panel" id="ingredientsPanel" style="display: none;">
            <h3>🧪 Найденные ингредиенты:</h3>
            <div id="ingredientsList"></div>
        </div>

        <div class="controls">
            <button id="startCamera" class="btn">📷 Включить камеру</button>
            <button id="startScan" class="btn btn-success" style="display: none;">🔍 Начать сканирование</button>
            <button id="stopScan" class="btn btn-danger" style="display: none;">⏹ Остановить</button>
            <button id="scanBarcode" class="btn btn-primary" style="display: none;">📸 Сканировать штрихкод</button>
            <button id="sendData" class="btn btn-primary" style="display: none;">📤 Отправить в бота</button>
            <button id="saveProduct" class="btn btn-success" style="display: none;">💾 Сохранить продукт</button>
            <button id="reset" class="btn btn-secondary" style="display: none;">🔄 Сброс</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#667eea');

        // Переменные
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let overlay = document.getElementById('overlay');
        let ctx = canvas.getContext('2d');
        let octx = overlay.getContext('2d');
        let stream = null;
        let isScanning = false;
        let scanInterval = null;
        let scanCount = 0;

        // Устанавливаем размеры overlay
        overlay.width = 400;
        overlay.height = 300;

        // Хранилище найденных слов
        let detectedWords = new Map();
        let ingredients = new Set();

        // Элементы управления
        let startCameraBtn = document.getElementById('startCamera');
        let startScanBtn = document.getElementById('startScan');
        let stopScanBtn = document.getElementById('stopScan');
        let scanBarcodeBtn = document.getElementById('scanBarcode');
        let sendDataBtn = document.getElementById('sendData');
        let saveProductBtn = document.getElementById('saveProduct');
        let resetBtn = document.getElementById('reset');
        let statusDiv = document.getElementById('status');
        let ingredientsPanel = document.getElementById('ingredientsPanel');

        // Статистика
        let ingredientsList = document.getElementById('ingredientsList');
        let wordCountEl = document.getElementById('wordCount');
        let ingredientCountEl = document.getElementById('ingredientCount');

        let scanCountEl = document.getElementById('scanCount');
        // Обработчики событий
        startCameraBtn.addEventListener('click', startCamera);
        startScanBtn.addEventListener('click', startScanning);
        stopScanBtn.addEventListener('click', stopScanning);
        scanBarcodeBtn.addEventListener('click', scanBarcode);
        sendDataBtn.addEventListener('click', sendData);
        saveProductBtn.addEventListener('click', saveProduct);
        resetBtn.addEventListener('click', resetScanner);

        async function startCamera() {
            try {
                updateStatus('📷 Включение камеры...', 'scanning');
                
                // Проверяем поддержку
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('Камера не поддерживается');
                }
                
                // Запрашиваем права на камеру
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                if (!stream) {
                    throw new Error('Не удалось получить доступ к камере');
                }
                
                video.srcObject = stream;
                
                // Ждем загрузки видео
                video.onloadedmetadata = () => {
                    video.play();
                    startCameraBtn.style.display = 'none';
                    startScanBtn.style.display = 'block';
                    scanBarcodeBtn.style.display = 'block';
                    updateStatus('📸 Камера включена. Выберите действие', 'found');
                };
                
            } catch (error) {
                console.error('Ошибка камеры:', error);
                
                if (error.name === 'NotAllowedError') {
                    updateStatus('❌ Доступ к камере запрещен. Разрешите в настройках браузера', 'error');
                } else if (error.name === 'NotFoundError') {
                    updateStatus('❌ Камера не найдена', 'error');
                } else if (error.name === 'NotSupportedError') {
                    updateStatus('❌ Камера не поддерживается', 'error');
                } else {
                    updateStatus('❌ Ошибка камеры: ' + error.message, 'error');
                }
                
                // Показываем альтернативу
                showFileInput();
            }
        }

        function showFileInput() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            
                            startCameraBtn.style.display = 'none';
                            startScanBtn.style.display = 'block';
                            
                            updateStatus('📷 Фото загружено. Нажмите "Начать сканирование"', 'found');
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function startScanning() {
            if (isScanning) return;
            
            isScanning = true;
            startScanBtn.style.display = 'none';
            stopScanBtn.style.display = 'block';
            ingredientsPanel.style.display = 'block';
            
            updateStatus('🔍 Сканирование...', 'scanning');
            
            // Начинаем сканирование каждые 3000мс (увеличили для стабильности)
            scanInterval = setInterval(scanFrame, 3000);
        }

        function stopScanning() {
            if (!isScanning) return;
            
            isScanning = false;
            clearInterval(scanInterval);
            
            stopScanBtn.style.display = 'none';
            sendDataBtn.style.display = 'block';
            saveProductBtn.style.display = 'block';
            resetBtn.style.display = 'block';
            
            updateStatus(`✅ Сканирование завершено! Найдено ${ingredients.size} ингредиентов`, 'found');
        }

        async function scanFrame() {
            if (!isScanning) return;
            
            try {
                // Захватываем кадр
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                scanCount++;
                updateStats();
                
                // OCR распознавание с улучшенными параметрами
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                
                console.log('🔍 Начинаем OCR...');
                
                const result = await Tesseract.recognize(imageData, 'eng+rus', {
                    logger: (m) => {
                        if (m.status === 'recognizing text') {
                            const progress = Math.round(m.progress * 100);
                            if (progress % 25 === 0) {
                                console.log(`OCR прогресс: ${progress}%`);
                                updateStatus(`🔍 Распознавание... ${progress}%`, 'scanning');
                            }
                        }
                    },
                    tessedit_ocr_engine_mode: '1', // LSTM
                    tessedit_pageseg_mode: '6', // Sparse text
                    preserve_interword_spaces: '1'
                });
                
                console.log('📝 Результат OCR:', result.data.text);
                console.log('📝 Найдено слов:', result.data.words.length);
                
                // Обрабатываем распознанные слова
                if (result.data.words && result.data.words.length > 0) {
                    handleWords(result.data.words);
                } else {
                    console.log('⚠️ Слова не найдены');
                }
                
            } catch (error) {
                console.error('❌ Ошибка сканирования:', error);
                updateStatus('❌ Ошибка распознавания', 'error');
                
                // Останавливаем сканирование при ошибке
                stopScanning();
            }
        }

        function handleWords(words) {
            const rawIngredients = words.map(w => w.text);
            const cleanIngredients = cleanIngredients(rawIngredients);
            
            console.log(`📝 Оригинальных слов: ${rawIngredients.length}`);
            console.log(`🧪 Чистых ингредиентов: ${cleanIngredients.length}`);
            
            cleanIngredients.forEach(ingredient => {
                if (!ingredients.has(ingredient)) {
                    ingredients.add(ingredient);
                    updateIngredientsList();
                }
            });
            
            words.forEach(word => {
                const normalizedText = normalizeText(word.text);
                if (cleanIngredients.includes(normalizedText)) {
                    if (!detectedWords.has(normalizedText)) {
                        detectedWords.set(normalizedText, {
                            text: normalizedText,
                            x: word.bbox.x0,
                            y: word.bbox.y0,
                            w: word.bbox.x1 - word.bbox.x0,
                            h: word.bbox.y1 - word.bbox.y0,
                            confidence: word.confidence,
                            firstSeen: Date.now()
                        });
                        
                        updateStats();
                    } else {
                        const existing = detectedWords.get(normalizedText);
                        if (existing) {
                            existing.lastSeen = Date.now();
                        }
                    }
                }
            });
            
            // Отрисовка overlay
            drawOverlay();
            updateStatus(`✅ Найдено ${ingredients.size} ингредиентов`, 'found');
        }

        function normalizeText(text) {
            text = text.toUpperCase();
            
            // Исправляем OCR ошибки
            text = text.replace("0", "O");
            text = text.replace("1", "I");
            text = text.replace("5", "S");
            text = text.replace("8", "B");
            
            // Убираем все кроме букв и пробелов
            text = text.replace(/[^A-Z ]/g, '');
            
            if (text.length < 4) {
                return null;
            }
            
            return text.trim();
        }

        function cleanIngredients(rawList) {
            const result = new Set();
            const BAD_WORDS = new Set([
                "INGREDIENTS", "AQUA", "WATER", "AND", "THE",
                "WITH", "FOR", "OF", "CONTAINS", "PRODUCT",
                "ACTIVE", "NATURAL", "ORGANIC", "ML", "OZ", 
                "G", "KG", "L", "FL", "PERFUME", "FRAGRANCE"
            ]);
            
            for (let word of rawList) {
                const normalized = normalizeText(word);
                if (normalized && !BAD_WORDS.has(normalized)) {
                    result.add(normalized);
                }
            }
            
            return Array.from(result);
        }

        function findMatch(word, db) {
            // Fuzzy matching
            const matches = getCloseMatches(word, Object.keys(db), 1, 0.8);
            return matches.length > 0 ? matches[0] : null;
        }

        function getCloseMatches(word, possibilities, n = 1, cutoff = 0.6) {
            const matches = [];
            
            for (let possibility of possibilities) {
                const similarity = stringSimilarity(word, possibility);
                if (similarity >= cutoff) {
                    matches.push({ word: possibility, similarity });
                }
            }
            
            matches.sort((a, b) => b.similarity - a.similarity);
            return matches.slice(0, n).map(m => m.word);
        }

        function stringSimilarity(str1, str2) {
            const longer = str1.length > str2.length ? str1 : str2;
            const shorter = str1.length > str2.length ? str2 : str1;
            
            if (longer.length === 0) return 1.0;
            if (shorter.length === 0) return 0.0;
            
            const editDistance = levenshteinDistance(longer, shorter);
            return (longer.length - editDistance) / longer.length;
        }

        function levenshteinDistance(str1, str2) {
            const matrix = [];
            
            for (let i = 0; i <= str2.length; i++) {
                matrix[i] = [i];
            }
            
            for (let j = 0; j <= str1.length; j++) {
                matrix[0][j] = j;
            }
            
            for (let i = 1; i <= str2.length; i++) {
                for (let j = 1; j <= str1.length; j++) {
                    if (str2.charAt(i - 1) === str1.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }
            
            return matrix[str2.length][str1.length];
        }

        function isIngredient(word) {
            if (!word || word.length < 2) return false;
            if (word.length > 30) return false;
            
            // Исключаем цифры и короткие слова
            if (/^\d+$/.test(word)) return false;
            
            // Исключаем общие слова
            const excludeWords = [
                'THE', 'AND', 'FOR', 'WITH', 'INGREDIENTS', 'AQUA', 'WATER', 
                'PRODUCT', 'CONTAINS', 'ACTIVE', 'NATURAL', 'ORGANIC',
                'ML', 'OZ', 'G', 'KG', 'L', 'FL', 'OZ'
            ];
            if (excludeWords.includes(word)) return false;
            
            // Расширенные химические паттерны
            const chemicalPatterns = [
                /^[A-Z]+[0-9]*$/,  // ACID, VITAMIN C, etc
                /^[A-Z]+-+[A-Z0-9]+$/, // COENZYME Q10, BETA-CAROTENE
                /^[A-Z]+.*OL$/, // ALCOHOL, PHENOL, RETINOL
                /^[A-Z]+.*IC$/, // ACID, BASIC, HYDROXY
                /^[A-Z]+.*YL$/, // METHYL, ETHYL, PROPYL
                /^[A-Z]+.*OXIDE$/, // ZINC OXIDE, TITANIUM DIOXIDE
                /^[A-Z]+.*LATE$/, // SILICONE, DIMETHICONE
                /^[A-Z]+.*ONE$/, // CETONE, ACETONE
                /^[A-Z]+.*ANE$/, // METHANE, ETHANE
                /^[A-Z]+.*ENE$/, // PROPENE, BUTENE
                /^[A-Z]+.*IN$/, // TOCOPHERIN, RETININ
                /^[A-Z]+.*IDE$/, // AMIDE, CHLORIDE
                /^[A-Z]+.*ATE$/, // CITRATE, LACTATE
                /^[A-Z]+.*UM$/, // GUM, POLYSACCHARIDUM
                /^[A-Z]+.*US$/, // POLYSACCHARUS
                /^[A-Z]+.*EXTRACT$/, // GREEN TEA EXTRACT
                /^[A-Z]+.*OIL$/, // COCONUT OIL, OLIVE OIL
                /^[A-Z]+.*BUTTER$/, // SHEA BUTTER
                /^[A-Z]+.*WAX$/, // BEESWAX, CARNAUBA WAX
                /^[A-Z]+.*ACID$/, // SALICYLIC ACID, HYALURONIC ACID
                /^[A-Z]+.*SULFATE$/, // SODIUM LAURYL SULFATE
                /^[A-Z]+.*PARABEN$/, // METHYLPARABEN, PROPYLPARABEN
                /^[A-Z]+.*GLUCOSIDE$/, // DECYL GLUCOSIDE
                /^[A-Z]+.*CERAMIDE$/, // CERAMIDE NP, CERAMIDE AP
                /^[A-Z]+.*PEPTIDE$/, // COPPER PEPTIDE, MATRIXYL
                /^[A-Z]+.*ANTHOXANTHIN$/, // ZEAXANTHIN, LUTEIN
                /^[A-Z]+.*FLAVONOID$/, // QUERCETIN, KAEMPFEROL
            ];
            
            // Проверяем по паттернам
            if (chemicalPatterns.some(pattern => pattern.test(word))) {
                console.log(`✅ Найден ингредиент: ${word}`);
                return true;
            }
            
            // Проверяем по списку известных ингредиентов
            const knownIngredients = [
                'GLYCERIN', 'HYALURONIC', 'NIACINAMIDE', 'RETINOL', 'SALICYLIC',
                'ALOE', 'CHAMOMILE', 'GREEN', 'TEA', 'VITAMIN', 'C', 'E',
                'ZINC', 'TITANIUM', 'DIMETHICONE', 'CYCLOMETHICONE',
                'CETEARYL', 'ALCOHOL', 'PANTHENOL', 'ALLANTOIN',
                'BISABOLOL', 'CERAMIDE', 'PEPTIDES', 'COENZYME',
                'SQUALANE', 'JOJOBA', 'SHEA', 'COCONUT', 'ARGAN',
                'ROSEHIP', 'AVOCADO', 'ALMOND', 'LAVENDER', 'TEA',
                'TREE', 'PEPPERMINT', 'EUCALYPTUS', 'LEMON', 'ORANGE',
                'PARFUM', 'FRAGRANCE', 'LINALOOL', 'LIMONENE',
                'PHENOXYETHANOL', 'CARBOMER', 'XANTHAN', 'GUAR',
                'STEARIC', 'PALMITIC', 'OLEIC', 'LINOLEIC', 'CITRIC'
            ];
            
            if (knownIngredients.some(ing => word.includes(ing) || ing.includes(word))) {
                console.log(`✅ Найден известный ингредиент: ${word}`);
                return true;
            }
            
            return false;
        }

        function drawOverlay() {
            if (!octx) return;
            
            octx.clearRect(0, 0, overlay.width, overlay.height);
            
            detectedWords.forEach((word, text) => {
                const age = Date.now() - word.firstSeen;
                const opacity = Math.max(0.3, 1 - age / 10000); // Исчезает за 10 секунд
                
                octx.strokeStyle = `rgba(255, 107, 107, ${opacity})`;
                octx.lineWidth = 2;
                octx.strokeRect(word.x, word.y, word.w, word.h);
                
                octx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                octx.fillRect(word.x, word.y - 20, text.length * 8 + 4, 20);
                
                octx.fillStyle = `rgba(255, 107, 107, ${opacity})`;
                octx.font = 'bold 12px Arial';
                octx.fillText(text, word.x + 2, word.y - 5);
            });
        }

        function updateIngredientsList() {
            ingredientsList.innerHTML = '';
            
            Array.from(ingredients).sort().forEach(ingredient => {
                const tag = document.createElement('span');
                tag.className = 'ingredient-tag';
                tag.textContent = ingredient;
                ingredientsList.appendChild(tag);
            });
        }

        function updateStats() {
            wordCountEl.textContent = detectedWords.size;
            ingredientCountEl.textContent = ingredients.size;
            scanCountEl.textContent = scanCount;
        }

        function sendData() {
            if (ingredients.size === 0) {
                updateStatus('❌ Нет ингредиентов для отправки', 'error');
                return;
            }
            
            try {
                const data = {
                    action: 'scan_ingredients',
                    ingredients: Array.from(ingredients).join(', '),
                    scan_count: scanCount,
                    words_found: detectedWords.size,
                    timestamp: new Date().toISOString()
                };
                
                console.log('📤 Отправка данных:', data);
                
                tg.sendData(JSON.stringify(data));
                
                updateStatus('📤 Данные отправлены в бота!', 'found');
                
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка отправки:', error);
                updateStatus('❌ Ошибка отправки данных', 'error');
            }
        }

        function resetScanner() {
            // Сброс всех состояний
            detectedWords.clear();
            ingredients.clear();
            scanCount = 0;
            isScanning = false;
            
            if (scanInterval) {
                clearInterval(scanInterval);
            }
            
            // Очистка интерфейса
            if (octx) {
                octx.clearRect(0, 0, overlay.width, overlay.height);
            }
            ingredientsList.innerHTML = '';
            ingredientsPanel.style.display = 'none';
            
            // Обновление кнопок
            startScanBtn.style.display = 'block';
            stopScanBtn.style.display = 'none';
            sendDataBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            
            updateStats();
            updateStatus('📸 Готов к новому сканированию', 'found');
        }

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            console.log('Status:', message);
        }

        // Инициализация
        updateStatus('📷 Нажмите "Включить камеру" для начала', 'found');
        
        // Проверка поддержки камеры
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            updateStatus('❌ Камера не поддерживается', 'error');
            showFileInput();
        }

        function scanBarcode() {
            try {
                updateStatus('📸 Сканирование штрихкода...', 'scanning');
                
                // Используем BarcodeReader или QuaggaJS
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
                script.onload = () => {
                    const codeReader = new ZXing.BrowserMultiFormatReader();
                    
                    // Захватываем кадр для сканирования
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    codeReader.decodeFromImageData(imageData)
                        .then(result => {
                            console.log('📸 Штрихкод найден:', result.text);
                            
                            // Отправляем штрихкод в бота
                            tg.sendData(JSON.stringify({
                                type: "barcode",
                                barcode: result.text
                            }));
                            
                            updateStatus('📸 Штрихкод отправлен', 'found');
                            
                            // Закрываем Web App
                            setTimeout(() => {
                                tg.close();
                            }, 1000);
                        })
                        .catch(err => {
                            console.error('❌ Ошибка сканирования штрихкода:', err);
                            updateStatus('❌ Штрихкод не найден. Попробуйте еще раз', 'error');
                        });
                };
                document.head.appendChild(script);
                
            } catch (error) {
                console.error('❌ Ошибка сканирования штрихкода:', error);
                updateStatus('❌ Не удалось просканировать штрихкод', 'error');
            }
        }

        function saveProduct() {
            const productName = prompt('Введите название продукта:');
            if (!productName) return;
            
            const productBarcode = prompt('Введите штрихкод (если есть):');
            
            try {
                updateStatus('💾 Сохранение продукта...', 'scanning');
                
                // Отправляем данные в бота
                tg.sendData(JSON.stringify({
                    type: "ingredients",
                    barcode: productBarcode || `manual_${Date.now()}`,
                    name: productName,
                    ingredients: Array.from(ingredients).join(', ')
                }));
                
                updateStatus('💾 Продукт отправлен', 'found');
                
                // Закрываем Web App
                setTimeout(() => {
                    tg.close();
                }, 1000);
                
            } catch (error) {
                console.error('❌ Ошибка сохранения:', error);
                updateStatus('❌ Не удалось сохранить продукт', 'error');
            }
        }
    </script>
</body>
</html>
