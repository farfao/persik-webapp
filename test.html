<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Telegram Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        #status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🧪 Тест Telegram Web App</h1>
    <div id="status"></div>
    <button onclick="testTelegram()">🧪 Проверить Telegram API</button>
    <button onclick="sendTestData()">📤 Отправить тестовые данные</button>
    
    <script>
        console.log("🔧 Страница загружена");
        console.log("🔧 Telegram объект:", typeof Telegram);
        console.log("🔧 Telegram.WebApp:", typeof Telegram?.WebApp);
        
        function updateStatus(message, type) {
            document.getElementById('status').innerHTML = `<div class="${type}">${message}</div>`;
        }
        
        function testTelegram() {
            console.log("🧪 Тестируем Telegram API...");
            
            if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
                console.log("🧪 Telegram API доступен!");
                updateStatus("✅ Telegram API доступен!", "success");
                
                const tg = Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                console.log("🧪 WebApp готов:", tg.isReady);
                console.log("🧪 Пользователь:", tg.initDataUnsafe?.user);
                
                if (tg.isReady) {
                    updateStatus("✅ WebApp инициализирован! Пользователь: " + (tg.initDataUnsafe?.user?.first_name || "неизвестен"), "success");
                } else {
                    updateStatus("❌ WebApp не инициализирован", "error");
                }
            } else {
                console.error("🧪 Telegram API недоступен!");
                updateStatus("❌ Telegram API недоступен!", "error");
            }
        }
        
        function sendTestData() {
            console.log("📤 Отправляем тестовые данные...");
            
            if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
                const testData = {
                    action: 'scan_ingredients',
                    ingredients: 'Aqua, Glycerin, Niacinamide, Panthenol'
                };
                
                console.log("📤 Данные для отправки:", JSON.stringify(testData));
                
                Telegram.WebApp.sendData(JSON.stringify(testData));
                updateStatus("📤 Данные отправлены в бота!", "success");
                
                setTimeout(() => {
                    Telegram.WebApp.close();
                }, 2000);
            } else {
                updateStatus("❌ Telegram API недоступен для отправки!", "error");
            }
        }
        
        // Автоматическая проверка при загрузке
        setTimeout(testTelegram, 1000);
    </script>
</body>
</html>
