<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой тест</title>
    <script>
        // Загружаем Telegram API напрямую
        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s); js.id = id;
            js.src = 'https://telegram.org/js/telegram-web-app.js';
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'telegram-web-app'));
        
        window.onload = function() {
            document.getElementById('status').innerHTML = '🔧 Загрузка скрипта...';
            
            setTimeout(function() {
                if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
                    const tg = Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    
                    document.getElementById('status').innerHTML = '✅ Telegram API готов!';
                    document.getElementById('sendBtn').style.display = 'block';
                    
                    document.getElementById('sendBtn').onclick = function() {
                        const data = {
                            action: 'scan_ingredients',
                            ingredients: 'Aqua, Glycerin, Niacinamide'
                        };
                        
                        console.log("📤 Отправляем данные:", JSON.stringify(data));
                        
                        try {
                            tg.sendData(JSON.stringify(data));
                            document.getElementById('status').innerHTML = '📤 Данные отправлены!';
                            
                            setTimeout(() => tg.close(), 2000);
                        } catch (error) {
                            console.error("📤 Ошибка отправки:", error);
                            document.getElementById('status').innerHTML = '❌ Ошибка отправки: ' + error.message;
                        }
                    };
                } else {
                    document.getElementById('status').innerHTML = '❌ Telegram API не загружен';
                }
            }, 2000);
        };
    </script>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; margin: 10px; border-radius: 5px; cursor: pointer; }
        #sendBtn { display: none; }
    </style>
</head>
<body>
    <h1>🧪 Простой тест Telegram</h1>
    <div id="status">🔧 Загрузка...</div>
    <button id="sendBtn">📤 Отправить данные</button>
</body>
</html>
