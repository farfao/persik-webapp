<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Персик Premium - Сканирование состава</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #f0f0f0;
        }
        .header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .camera-section {
            padding: 20px 0;
            text-align: center;
        }
        #video {
            width: 100%;
            max-width: 300px;
            height: 200px;
            border-radius: 10px;
            background: #000;
            margin: 10px 0;
        }
        #canvas {
            display: none;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #48bb78;
        }
        .btn-secondary:hover {
            background: #38a169;
        }
        .btn-danger {
            background: #f56565;
        }
        .btn-danger:hover {
            background: #e53e3e;
        }
        .result-section {
            padding: 20px 0;
            display: none;
        }
        .result-box {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }
        .ingredients-list {
            background: #edf2f7;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }
        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }
        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }
        .status.info {
            background: #bee3f8;
            color: #2c5282;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Персик Premium</h1>
            <p>Сканирование состава косметики</p>
        </div>

        <div class="camera-section">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            
            <div id="status" class="status info">
                📷 Нажмите "📸 Сделать фото" для сканирования
            </div>

            <div id="camera-controls">
                <button id="startCamera" class="btn">📷 Включить камеру</button>
                <button id="capture" class="btn" style="display: none;">📸 Сделать фото</button>
                <button id="analyze" class="btn btn-secondary" style="display: none;">🔍 Распознать текст</button>
                <button id="send" class="btn" style="display: none;">📤 Отправить состав</button>
                <button id="reset" class="btn btn-danger" style="display: none;">🔄 Новое сканирование</button>
            </div>
        </div>

        <div id="result-section" class="result-section">
            <div class="result-box">
                <h3>🔍 Распознанный состав:</h3>
                <div id="ingredients" class="ingredients-list">
                    Состав будет здесь...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#667eea');

        // Переменные
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let context = canvas.getContext('2d');
        let stream = null;
        let recognizedText = '';

        // Элементы управления
        let startCameraBtn = document.getElementById('startCamera');
        let captureBtn = document.getElementById('capture');
        let analyzeBtn = document.getElementById('analyze');
        let sendBtn = document.getElementById('send');
        let resetBtn = document.getElementById('reset');
        let statusDiv = document.getElementById('status');
        let ingredientsDiv = document.getElementById('ingredients');
        let resultSection = document.getElementById('result-section');

        // Обработчики событий
        startCameraBtn.addEventListener('click', startCamera);
        captureBtn.addEventListener('click', captureImage);
        analyzeBtn.addEventListener('click', analyzeImage);
        sendBtn.addEventListener('click', sendToBot);
        resetBtn.addEventListener('click', resetScanner);

        async function startCamera() {
            try {
                updateStatus('📷 Включение камеры...', 'info');
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false 
                });
                
                video.srcObject = stream;
                
                startCameraBtn.style.display = 'none';
                captureBtn.style.display = 'inline-block';
                
                updateStatus('📸 Камера включена. Сделайте фото!', 'success');
                
            } catch (error) {
                console.error('Ошибка камеры:', error);
                updateStatus('❌ Не удалось включить камеру', 'error');
                
                // Альтернатива - загрузка файла
                showFileInput();
            }
        }

        function showFileInput() {
            updateStatus('📁 Выберите фото из галереи', 'info');
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            canvas.width = img.width;
                            canvas.height = img.height;
                            context.drawImage(img, 0, 0);
                            
                            startCameraBtn.style.display = 'none';
                            captureBtn.style.display = 'none';
                            analyzeBtn.style.display = 'inline-block';
                            
                            updateStatus('📷 Фото загружено. Нажмите "Распознать"', 'success');
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function captureImage() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            // Останавливаем видео
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            video.style.display = 'none';
            captureBtn.style.display = 'none';
            analyzeBtn.style.display = 'inline-block';
            
            updateStatus('📷 Фото сделано. Нажмите "Распознать"', 'success');
        }

        async function analyzeImage() {
            updateStatus('🔍 Распознавание текста...', 'info');
            
            try {
                // Улучшаем изображение для OCR
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                
                const result = await Tesseract.recognize(
                    imageData,
                    'rus+eng',
                    {
                        logger: (m) => {
                            if (m.status === 'recognizing text') {
                                const progress = Math.round(m.progress * 100);
                                updateStatus(`🔍 Распознавание... ${progress}%`, 'info');
                            }
                        }
                    }
                );
                
                recognizedText = result.data;
                const cleanedText = cleanIngredients(recognizedText);
                
                ingredientsDiv.textContent = cleanedText || 'Текст не распознан';
                resultSection.style.display = 'block';
                analyzeBtn.style.display = 'none';
                sendBtn.style.display = 'inline-block';
                resetBtn.style.display = 'inline-block';
                
                updateStatus('✅ Распознавание завершено!', 'success');
                
            } catch (error) {
                console.error('Ошибка OCR:', error);
                updateStatus('❌ Ошибка распознавания', 'error');
            }
        }

        function cleanIngredients(text) {
            // Очистка и форматирование распознанного текста
            let cleaned = text
                .replace(/[^\w\s.,-]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            
            // Ищем INCI состав
            const inciMatch = cleaned.match(/ingredients?:?\s*([^.]+)/i);
            if (inciMatch) {
                cleaned = inciMatch[1];
            }
            
            return cleaned;
        }

        function sendToBot() {
            if (!recognizedText.trim()) {
                updateStatus('❌ Нет данных для отправки', 'error');
                return;
            }
            
            try {
                const data = {
                    action: 'scan_ingredients',
                    ingredients: recognizedText.trim(),
                    timestamp: new Date().toISOString()
                };
                
                console.log('📤 Отправка данных:', data);
                
                tg.sendData(JSON.stringify(data));
                
                updateStatus('📤 Данные отправлены!', 'success');
                
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
            } catch (error) {
                console.error('Ошибка отправки:', error);
                updateStatus('❌ Ошибка отправки данных', 'error');
            }
        }

        function resetScanner() {
            // Сброс всех состояний
            recognizedText = '';
            resultSection.style.display = 'none';
            video.style.display = 'block';
            
            startCameraBtn.style.display = 'inline-block';
            captureBtn.style.display = 'none';
            analyzeBtn.style.display = 'none';
            sendBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            
            updateStatus('📷 Нажмите "📸 Сделать фото" для сканирования', 'info');
            
            // Перезапуск камеры
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            console.log('Status:', message);
        }

        // Инициализация
        updateStatus('📷 Нажмите "📸 Сделать фото" для сканирования', 'info');
        
        // Проверка поддержки камеры
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            updateStatus('❌ Камера не поддерживается', 'error');
            showFileInput();
        }
    </script>
</body>
</html>
